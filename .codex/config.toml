# Codex project config for orchestra.
# Linear MCP via the mcp-remote stdio bridge (handles the OAuth flow;
# works on Codex versions without native streamable-HTTP support).
# pnpx, not npx: Node here is installed via pnpm only.
[mcp_servers.linear]
command = "pnpx"
args = ["mcp-remote", "https://mcp.linear.app/mcp"]
startup_timeout_sec = 60
