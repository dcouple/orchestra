<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title><!-- <item title> — Explainer --></title>
<style>
  :root {
    --paper: #FAF8F5;
    --ink: #1F2328;
    --ink-soft: #5A5F66;
    --line: #E4DFD7;
    --panel: #FFFFFF;
    --accent: #0E7569;
    --accent-soft: #E3F0EE;
    --warn: #B45309;
    --warn-soft: #F7EBDD;
    --out: #9F3A38;
    --out-soft: #F6E8E7;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --serif: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper: #15191D; --ink: #E8E6E1; --ink-soft: #9BA1A8;
      --line: #2C3237; --panel: #1C2126;
      --accent: #2FA79A; --accent-soft: #16302D;
      --warn: #D98E3D; --warn-soft: #32271A;
      --out: #CF6F6C; --out-soft: #33211F;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); line-height: 1.6; font-size: 16px; }
  .page { max-width: 720px; margin: 0 auto; padding: 3rem 1.25rem 5rem; }

  header.masthead { border-bottom: 1px solid var(--line); padding-bottom: 1.75rem; margin-bottom: 2.5rem; }
  .meta-row { display: flex; flex-wrap: wrap; gap: .5rem .75rem; align-items: center; margin-bottom: 1rem; }
  .badge { font-family: var(--mono); font-size: .72rem; letter-spacing: .06em; padding: .2rem .55rem; border-radius: 3px; text-transform: uppercase; }
  .badge.type { background: var(--accent-soft); color: var(--accent); }
  .badge.status { border: 1px solid var(--line); color: var(--ink-soft); }
  h1 { font-family: var(--serif); font-weight: 500; font-size: 2.1rem; line-height: 1.2; letter-spacing: -.01em; text-wrap: balance; margin-bottom: .75rem; }
  .standfirst { color: var(--ink-soft); font-size: 1.05rem; max-width: 60ch; }
  .links { margin-top: 1rem; font-size: .85rem; display: flex; gap: 1.25rem; flex-wrap: wrap; }
  .links a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }

  section { margin-bottom: 2.75rem; }
  .eyebrow { font-family: var(--mono); font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--accent); margin-bottom: .6rem; }
  h2 { font-size: 1.25rem; margin-bottom: .75rem; letter-spacing: -.01em; }
  p { margin-bottom: .9rem; max-width: 65ch; }
  code { font-family: var(--mono); font-size: .85em; background: var(--panel); border: 1px solid var(--line); padding: .08em .35em; border-radius: 3px; }

  /* Before/after (or expected/actual) panel pair */
  .before-after { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin: 1.25rem 0; }
  @media (max-width: 560px) { .before-after { grid-template-columns: 1fr; } }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 1.1rem 1.2rem; }
  .panel h3 { margin-bottom: .6rem; font-size: .78rem; font-family: var(--mono); letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); }
  .panel.after { border-color: var(--accent); }
  .panel.after h3 { color: var(--accent); }
  .panel ul { padding-left: 1.1rem; font-size: .92rem; }
  .panel li { margin-bottom: .4rem; }

  /* Opening diagram — required slot right after the masthead */
  .diagram { margin: 1.5rem 0 2.5rem; }
  .diagram svg, .diagram img { display: block; max-width: 100%; height: auto; }
  .diagram figcaption { margin-top: .5rem; font-size: .8rem; color: var(--ink-soft); }

  /* Horizontal flow of stages/components — reuse for epic phase timelines */
  .pipeline { display: flex; align-items: stretch; margin: 1.5rem 0; overflow-x: auto; padding-bottom: .5rem; }
  .stage { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: .75rem .9rem; min-width: 130px; flex: 1; }
  .stage.hot { border-color: var(--accent); background: var(--accent-soft); }
  .stage .name { font-family: var(--mono); font-size: .78rem; font-weight: 600; margin-bottom: .25rem; }
  .stage .desc { font-size: .78rem; color: var(--ink-soft); line-height: 1.45; }
  .arrow { align-self: center; padding: 0 .5rem; color: var(--ink-soft); flex: none; }
  .strip-note { margin: -.5rem 0 0; font-size: .8rem; color: var(--ink-soft); }

  /* Locked directions — one card per D-number */
  .decision { border-left: 3px solid var(--accent); padding: .2rem 0 .2rem 1.1rem; margin-bottom: 1.25rem; }
  .decision .tag { font-family: var(--mono); font-size: .78rem; font-weight: 700; color: var(--accent); }
  .decision p { margin: .3rem 0 0; font-size: .95rem; }
  .decision .rejected { color: var(--ink-soft); font-size: .85rem; }
  .decision .rejected::before { content: "rejected — "; font-style: italic; }

  /* In / out of scope */
  .scope { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 560px) { .scope { grid-template-columns: 1fr; } }
  .scope .panel.in { border-top: 3px solid var(--accent); }
  .scope .panel.outof { border-top: 3px solid var(--out); }
  .scope .panel.outof h3 { color: var(--out); }

  /* Acceptance criteria — auto-numbered AC1, AC2… */
  ol.acs { padding-left: 0; list-style: none; counter-reset: ac; }
  ol.acs li { counter-increment: ac; position: relative; padding-left: 3.2rem; margin-bottom: .8rem; font-size: .95rem; max-width: 62ch; }
  ol.acs li::before {
    content: "AC" counter(ac); position: absolute; left: 0; top: .1em;
    font-family: var(--mono); font-size: .72rem; font-weight: 700;
    color: var(--accent); background: var(--accent-soft); padding: .15rem .4rem; border-radius: 3px;
  }

  /* UI before/after mockups — a vertical stack of before|after PAIRS.
     Each .pair is its own 2-col grid, so rows can never bleed into each
     other, and captions sit in normal flow. align-items:start lets each
     card size to its content — short cards don't stretch, so there's no
     dead whitespace and no caption overflow. Never put fixed heights on a
     mock. See html-explainer.md · UI before/after mockups. */
  .shots { margin: 1.75rem 0; }
  .pair { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; align-items: start; margin-bottom: 2rem; }
  .pair:last-child { margin-bottom: 0; }
  @media (max-width: 560px) { .pair { grid-template-columns: 1fr; } }
  .shot { margin: 0; }
  .shot img { display: block; width: 100%; height: auto; border: 1px solid var(--line); border-radius: 8px; }
  .shot.after img { border-color: var(--accent); }
  .shot figcaption { margin-top: .55rem; font-size: .8rem; color: var(--ink-soft); line-height: 1.4; }
  .shot.after figcaption { color: var(--accent); }

  /* Schematic screen replica — build mockups from these parts when a real
     screenshot can't be driven. Content-sized (no heights), generous
     padding so it breathes. Compose, don't hand-roll. */
  .mock { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 1.1rem 1.15rem 1.25rem; font-size: .85rem; }
  .shot.after .mock { border-color: var(--accent); }
  .mock-eyebrow { font-family: var(--mono); font-size: .64rem; letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: .7rem; }
  .mock-q { font-weight: 600; font-size: .9rem; margin-bottom: .85rem; }
  .mock-opt { display: flex; align-items: center; gap: .6rem; border: 1px solid var(--line); border-radius: 6px; padding: .6rem .7rem; margin-bottom: .55rem; }
  .mock-opt:last-child { margin-bottom: 0; }
  .mock-opt.sel { border-color: var(--accent); background: var(--accent-soft); }
  .mock-opt .mark { width: 15px; height: 15px; flex: none; border: 1.5px solid var(--ink-soft); position: relative; }
  .mock-opt .mark.radio { border-radius: 50%; }
  .mock-opt .mark.check { border-radius: 4px; }
  .mock-opt.sel .mark { border-color: var(--accent); background: var(--accent); }
  .mock-opt.sel .mark.check::after { content: "✓"; position: absolute; inset: 0; color: var(--paper); font-size: 11px; line-height: 15px; text-align: center; }
  .mock-opt.sel .mark.radio::after { content: ""; position: absolute; inset: 4px; border-radius: 50%; background: var(--paper); }
  .mock-field { display: flex; justify-content: space-between; align-items: center; gap: 1rem; border: 1px solid var(--line); border-radius: 6px; padding: .6rem .7rem; margin-bottom: .55rem; color: var(--ink-soft); }
  .mock-field:last-child { margin-bottom: 0; }
  .mock-field.hl { border-color: var(--accent); }
  .mock-field .val { color: var(--ink); font-variant-numeric: tabular-nums; }
  .mock-doc { border: 1px dashed var(--line); border-radius: 6px; padding: 1.5rem .7rem; text-align: center; color: var(--ink-soft); margin-bottom: .7rem; }
  .shot.after .mock-doc { border-style: solid; border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
  .mock-actions { display: flex; gap: .5rem; margin-top: .2rem; }
  .mock-btn { font-size: .8rem; padding: .4rem .85rem; border-radius: 6px; border: 1px solid var(--line); color: var(--ink-soft); }
  .mock-btn.primary { background: var(--accent); border-color: var(--accent); color: var(--paper); }
  .mock-note { font-size: .76rem; color: var(--ink-soft); margin-top: .75rem; }

  /* Open questions */
  .question { background: var(--warn-soft); border-left: 3px solid var(--warn); border-radius: 0 6px 6px 0; padding: .8rem 1.1rem; margin-bottom: .75rem; font-size: .95rem; }
  .question strong { color: var(--warn); font-family: var(--mono); font-size: .78rem; letter-spacing: .05em; }

  /* User-journey flows — one .pipeline per journey, each labeled. Reuses
     .stage; .skip = a muted/dashed step the journey bypasses, .term = a
     terminal endpoint (e.g. an off-ramp). */
  .journey { margin: 0 0 1.5rem; }
  .journey:last-child { margin-bottom: 0; }
  /* Journey rows fit the page instead of scrolling: stages shrink (overrides
     the base .stage min-width / .pipeline overflow for .journey children). */
  .journey .pipeline { overflow-x: visible; }
  .journey .stage { min-width: 0; flex: 1 1 0; }
  .journey-label { font-weight: 600; font-size: .92rem; margin-bottom: .5rem; }
  .stage.skip { border-style: dashed; opacity: .6; }
  .stage.term { border-color: var(--accent); background: var(--accent-soft); }

  /* Verification as a categorized checklist (UX vs Backend) + a flow→check map */
  .vgroup { margin-bottom: 1.6rem; }
  .vgroup-head { font-family: var(--mono); font-size: .72rem; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); margin-bottom: .7rem; }
  .vlist { list-style: none; }
  .vlist li { position: relative; padding-left: 1.9rem; margin-bottom: .55rem; font-size: .92rem; line-height: 1.45; max-width: 66ch; }
  .vlist li::before { content: ""; position: absolute; left: 0; top: .18em; width: 15px; height: 15px; border: 1.5px solid var(--ink-soft); border-radius: 4px; }
  .flowmap { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: .85rem; }
  .flowmap th, .flowmap td { text-align: left; padding: .45rem .6rem; border-bottom: 1px solid var(--line); vertical-align: top; }
  .flowmap th { font-family: var(--mono); font-size: .66rem; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-soft); }
  .flowmap td:first-child { font-weight: 600; white-space: nowrap; }

  /* Run config — the zone panel. Shows the estimated zone (per zones.md) and
     the dials it derives; framed as an estimate the user finalizes at capture. */
  .dials { border: 1px solid var(--line); border-radius: 8px; background: var(--panel); padding: 1.15rem 1.3rem; }
  .dial { display: grid; grid-template-columns: 118px 1fr; gap: 1rem; align-items: start; padding: .8rem 0; border-bottom: 1px solid var(--line); }
  .dial:last-child { border-bottom: none; }
  .dial-label { font-family: var(--mono); font-size: .72rem; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-soft); padding-top: .3rem; }
  .dial-opts { display: flex; gap: .45rem; flex-wrap: wrap; align-items: center; }
  .pill { font-size: .82rem; padding: .32rem .72rem; border-radius: 999px; border: 1px solid var(--line); color: var(--ink-soft); }
  .pill.on { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .dial-why { flex-basis: 100%; font-size: .8rem; color: var(--ink-soft); margin: .4rem 0 0; }
  .dials-note { font-size: .8rem; color: var(--ink-soft); margin: .9rem 0 0; }

  footer { border-top: 1px solid var(--line); margin-top: 3rem; padding-top: 1.25rem; font-size: .8rem; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="page">
  <header class="masthead">
    <div class="meta-row">
      <span class="badge type"><!-- feature | epic | bug --></span>
      <span class="badge status"><!-- draft — for alignment | ready --></span>
    </div>
    <h1><!-- item title --></h1>
    <p class="standfirst"><!-- one-sentence intent, in the user's language --></p>
    <div class="links"><!-- GitHub issue link once it exists; omit before publish --></div>
  </header>

  <figure class="diagram">
    <!-- Opening diagram — required, see html-explainer.md. Architecture /
         flow of what's happening: inline SVG on the tokens, the .pipeline
         strip, or an inlined data: URI image. Never skipped. -->
    <figcaption><!-- one line: what the diagram shows --></figcaption>
  </figure>

  <!-- Sections per item type — see html-explainer.md for the section map.
       Each section follows this shape: -->
  <section>
    <p class="eyebrow">01 · <!-- Why / Direction / Scope / Done means / Unresolved --></p>
    <h2><!-- section heading --></h2>
    <!-- prose, .before-after, .pipeline, .decision cards, .scope, ol.acs, .question — pick what fits -->
    <!-- Work sequence (see html-explainer.md · Work sequence): epic = binding
         phase timeline; feature = indicative outcome-level work strip whose
         caption says /do re-plans; bug = strip only when the fix has stages.
    <div class="pipeline">
      <div class="stage"><div class="name">stage</div><div class="desc">outcome</div></div>
      <div class="arrow">&#8594;</div>
      <div class="stage"><div class="name">stage</div><div class="desc">outcome</div></div>
    </div>
    <p class="strip-note">Indicative sequence — /do's plan stage owns the real plan.</p> -->
    <!-- UI-touching items: a .shots stack, one .pair per touched surface
         (required — see html-explainer.md). Prefer real screenshots (<img>
         data: URIs) driven from the app; otherwise compose a schematic from
         the .mock parts. Captions say which side is real vs mocked. Never set
         a fixed height on a .mock — cards size to content so nothing overlaps.
    <div class="shots">
      <div class="pair">
        <figure class="shot">
          <div class="mock">
            <div class="mock-eyebrow">features</div>
            <div class="mock-q">What are you here for?</div>
            <div class="mock-opt sel"><span class="mark radio"></span>Team Chat</div>
            <div class="mock-opt"><span class="mark radio"></span>SMS</div>
          </div>
          <figcaption>Before — single-choice (indicative mockup, not a screenshot)</figcaption>
        </figure>
        <figure class="shot after">
          <div class="mock">
            <div class="mock-eyebrow">features</div>
            <div class="mock-q">What are you here for? (pick any)</div>
            <div class="mock-opt sel"><span class="mark check"></span>Patient texting</div>
            <div class="mock-opt sel"><span class="mark check"></span>Team chat</div>
            <div class="mock-opt"><span class="mark check"></span>External organizations</div>
          </div>
          <figcaption>After — multi-select (indicative mockup)</figcaption>
        </figure>
      </div>
    </div> -->
  </section>

  <!-- USER JOURNEYS (multi-journey items — see html-explainer.md · User journeys):
       one .pipeline per distinct journey, each with a .journey-label. .skip = a
       step this journey bypasses (muted/dashed); .term = a terminal off-ramp.
  <section>
    <p class="eyebrow">02 · User journeys</p>
    <h2>The divergent paths, not just the happy one</h2>
    <div class="journey">
      <div class="journey-label">Journey A — the divergent path</div>
      <div class="pipeline">
        <div class="stage"><div class="name">Entry step</div><div class="desc">where this journey starts</div></div>
        <div class="arrow">&#8594;</div>
        <div class="stage skip"><div class="name">Optional step</div><div class="desc">skipped on this path</div></div>
        <div class="arrow">&#8594;</div>
        <div class="stage term"><div class="name">Off-ramp</div><div class="desc">terminal — journey ends here</div></div>
      </div>
    </div>
  </section> -->

  <!-- VERIFICATION as a categorized checklist (see html-explainer.md · Verification):
       group by surface, then map each flow to the checks it exercises.
  <section>
    <p class="eyebrow">05 · Verification</p>
    <h2>What we'll check, by surface</h2>
    <div class="vgroup">
      <p class="vgroup-head">UX / in-app flows</p>
      <ul class="vlist"><li>AC1 — a human-runnable check</li><li>AC2 — …</li></ul>
    </div>
    <div class="vgroup">
      <p class="vgroup-head">Backend / data</p>
      <ul class="vlist"><li>AC10 — a test-provable check</li></ul>
    </div>
    <table class="flowmap">
      <tr><th>User flow</th><th>Exercises</th></tr>
      <tr><td>SMS user</td><td>AC1, AC2, AC4 · AC10, AC11</td></tr>
    </table>
  </section> -->

  <!-- RUN CONFIG — the zone panel (see html-explainer.md · Run config). The primary
       dial is the item's zone (per references/zones.md); the rest are the dials it
       derives. Framed as an estimate the human finalizes at capture.
  <section>
    <p class="eyebrow">06 · Run config</p>
    <h2>How /do will run this</h2>
    <div class="dials">
      <div class="dial">
        <div class="dial-label">Zone</div>
        <div class="dial-opts">
          <span class="pill">0</span><span class="pill on">1</span><span class="pill">2</span><span class="pill">3</span>
          <p class="dial-why">Substantial change, escalated by a money / schema touch (zones.md floors).</p>
        </div>
      </div>
      <div class="dial">
        <div class="dial-label">Derived</div>
        <div class="dial-opts"><span class="pill on">dual lanes</span><span class="pill on">cap 3/3</span><span class="pill on">frontend verifier</span><span class="pill on">QA always</span><span class="pill on">full dossier</span></div>
      </div>
    </div>
    <p class="dials-note">Estimated by /create-plan from stakes + consequence radius; dials derive from references/zones.md. You set the final zone at capture.</p>
  </section> -->

  <footer>
    Generated by <code><!-- /create-plan | /create-epic --></code> ·
    This page is the alignment surface; <code>item.md</code> remains the contract <code>/do</code> executes against.
  </footer>
</div>
</body>
</html>
