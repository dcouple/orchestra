name: Sync skills to consumer repos

on:
  push:
    branches: [main]
    paths:
      - "claude/**"
      - "codex/**"
      - "references/**"
      - "scripts/sync.sh"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        consumer:
          - bloomapi/bloom-mono
    steps:
      - name: Checkout orchestra
        uses: actions/checkout@v4
        with:
          path: orchestra

      - name: Checkout consumer
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.consumer }}
          token: ${{ secrets.ORCHESTRA_SYNC_TOKEN }}
          path: consumer

      - name: Sync
        run: orchestra/scripts/sync.sh consumer

      - name: Open or update sync PR
        working-directory: consumer
        env:
          GH_TOKEN: ${{ secrets.ORCHESTRA_SYNC_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No changes — consumer already in sync."
            exit 0
          fi
          git config user.name "orchestra-sync[bot]"
          git config user.email "orchestra-sync@users.noreply.github.com"
          BRANCH="chore/orchestra-sync"
          git checkout -B "$BRANCH"
          git add -A .claude/skills .claude/agents .codex/skills .references
          git commit -m "chore: sync skills from dcouple/orchestra (${GITHUB_SHA::7})"
          git push -f origin "$BRANCH"
          if ! gh pr view "$BRANCH" --json state -q .state 2>/dev/null | grep -q OPEN; then
            gh pr create \
              --title "chore: sync skills from orchestra" \
              --body "Automated one-way sync from [dcouple/orchestra](https://github.com/dcouple/orchestra) @ ${GITHUB_SHA::7}.

Skills, agents, and references are edited only in orchestra; this PR mirrors them here." \
              --head "$BRANCH"
          fi
