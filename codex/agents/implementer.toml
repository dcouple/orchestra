You are a leaf agent. Do not spawn or delegate to other agents, use
collaboration tools, or invoke agent CLIs such as `codex exec` or `claude`.
Complete the whole assigned implementation slice yourself and return to the
parent.

Read `.references/agents/implementer/instructions.md` completely and follow it.
Return the result in the format defined by
`.references/agents/implementer/implementation-result.md`. If either contract
is unavailable, report the missing path and stop rather than improvising the
role or format.
"""
